<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Face Activated Phone Screen</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      touch-action: manipulation;
      font-family: Arial, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      overflow: hidden;
    }

    /*
      视频层：
      默认隐藏。
      检测到人脸后才 visibility: visible + opacity: 1。
      这样可以解决部分手机浏览器里 video 盖住黑屏遮罩的问题。
    */
    #mainVideo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
      z-index: 1;
      opacity: 0;
      visibility: hidden;
    }

    /*
      黑屏层：
      始终在视频上方。
      但为了手机端稳定，黑屏时也会同时隐藏 video。
    */
    #blackout {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 10;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.2s linear;
    }

    #blackout.hide {
      opacity: 0;
    }

    /*
      右下角摄像头预览。
      调试时保留，方便确认前置摄像头有没有真的被遮住。
      正式展示时可以把 opacity 改成 0。
    */
    #cameraPreview {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 120px;
      height: 160px;
      object-fit: cover;
      z-index: 99998;
      opacity: 0.45;
      transform: scaleX(-1);
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: black;
    }

    /*
      左上角状态文字。
      现在永远显示，方便你在手机上排查。
      正式展示时可以 display: none。
    */
    #status {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 99999;
      color: #00ff88;
      background: rgba(0, 0, 0, 0.75);
      font-size: 14px;
      line-height: 1.4;
      padding: 8px 10px;
      border-radius: 6px;
      pointer-events: none;
      display: block;
      white-space: pre-line;
      max-width: calc(100vw - 24px);
      box-sizing: border-box;
    }

    #startLayer {
      position: fixed;
      inset: 0;
      z-index: 100000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      color: white;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #startBox {
      max-width: 320px;
    }

    #startButton {
      border: 1px solid white;
      background: transparent;
      color: white;
      font-size: 18px;
      padding: 14px 24px;
      border-radius: 999px;
    }

    #startHint {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      line-height: 1.5;
    }

    /*
      正式展示时，可以取消下面两段注释：

      #status {
        display: none;
      }

      #cameraPreview {
        opacity: 0;
      }
    */
  </style>
</head>

<body>
  <div id="app">
    <video
      id="mainVideo"
      playsinline
      webkit-playsinline
      muted
      loop
      preload="auto"
    ></video>

    <div id="blackout"></div>

    <video
      id="cameraPreview"
      autoplay
      muted
      playsinline
      webkit-playsinline
    ></video>

    <div id="status">status loading...</div>

    <div id="startLayer">
      <div id="startBox">
        <button id="startButton">点击启动</button>
        <div id="startHint">
          启动后请允许使用摄像头。<br />
          检测到人脸时全屏播放视频；检测不到时黑屏并暂停。
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      FaceDetector,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

    /*
      =========================
      可调参数
      =========================
    */

    // 检测间隔。越小越灵敏，但越耗电。
    const DETECT_INTERVAL_MS = 180;

    // 检测到人脸后，持续多少毫秒才点亮。
    const FACE_ON_DELAY_MS = 350;

    // 检测不到人脸后，延迟多少毫秒黑屏。
    const FACE_OFF_DELAY_MS = 800;

    // 人脸置信度阈值。
    // 如果一直误判有人，把它调高，例如 0.75。
    // 如果太难触发，把它调低，例如 0.55。
    const MIN_SCORE = 0.68;

    // 人脸面积占摄像头画面的最小比例。
    // 越大，要求人脸越近。
    const MIN_FACE_AREA_RATIO = 0.05;

    // 人脸中心必须靠近画面中间。
    // 越小越严格。
    const CENTER_TOLERANCE_X = 0.3;
    const CENTER_TOLERANCE_Y = 0.35;

    /*
      =========================
      DOM
      =========================
    */

    const mainVideo = document.getElementById("mainVideo");
    const cameraPreview = document.getElementById("cameraPreview");
    const blackout = document.getElementById("blackout");
    const startLayer = document.getElementById("startLayer");
    const startButton = document.getElementById("startButton");
    const statusEl = document.getElementById("status");

    statusEl.innerText = "JS 已加载，等待点击启动";

    /*
      =========================
      根据 screen 参数选择视频
      =========================
    */

    const params = new URLSearchParams(location.search);
    const screenId = params.get("screen") || "1";

    // 默认：
    // ?screen=1 -> videos/1.mp4
    // ?screen=2 -> videos/2.mp4
    // ?screen=3 -> videos/3.mp4
    //
    // 也可以直接指定：
    // ?video=videos/test.mp4
    const videoSrc = params.get("video") || `videos/${screenId}.mp4`;

    mainVideo.src = videoSrc;

    /*
      =========================
      状态变量
      =========================
    */

    let faceDetector = null;
    let cameraReady = false;
    let isScreenOn = false;
    let hasStartedLoop = false;

    let firstFaceSeenAt = 0;
    let lastFaceSeenAt = 0;
    let lastDetectAt = 0;

    let lastValidFace = false;
    let lastFaceCount = 0;
    let lastScore = 0;
    let lastAreaRatio = 0;
    let lastCentered = false;

    /*
      =========================
      启动按钮
      =========================
    */

    startButton.addEventListener("click", async () => {
      startButton.disabled = true;
      startButton.innerText = "启动中...";

      try {
        await enterFullscreen();

        setStatus("正在加载视频...");
        await prepareVideo();

        setStatus("正在打开前置摄像头...");
        await startCamera();

        setStatus("正在加载人脸检测模型...");
        await loadFaceDetector();

        startLayer.style.display = "none";

        // 初始状态：黑屏 + 视频隐藏 + 视频暂停
        turnScreenOff();

        setStatus("启动完成，开始检测人脸");

        if (!hasStartedLoop) {
          hasStartedLoop = true;
          detectLoop();
        }
      } catch (error) {
        console.error(error);

        startButton.disabled = false;
        startButton.innerText = "启动失败，点我重试";

        setStatus(
          "启动失败\n" +
          String(error && error.message ? error.message : error)
        );
      }
    });

    async function prepareVideo() {
      mainVideo.muted = true;
      mainVideo.loop = true;
      mainVideo.playsInline = true;
      mainVideo.setAttribute("playsinline", "");
      mainVideo.setAttribute("webkit-playsinline", "");

      await new Promise((resolve) => {
        if (mainVideo.readyState >= 1) {
          resolve();
          return;
        }

        mainVideo.onloadedmetadata = () => resolve();

        // 防止某些视频 metadata 加载慢导致卡住
        setTimeout(resolve, 2000);
      });

      // 不在这里播放，等检测到人脸再播放。
      mainVideo.pause();

      // 强制初始隐藏
      mainVideo.style.opacity = "0";
      mainVideo.style.visibility = "hidden";
      blackout.classList.remove("hide");
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("当前浏览器不支持摄像头。请使用 Safari 或 Chrome，并确认网址是 HTTPS。");
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: "user",
          width: { ideal: 320 },
          height: { ideal: 240 },
          frameRate: { ideal: 12, max: 15 }
        }
      });

      cameraPreview.srcObject = stream;

      await new Promise((resolve) => {
        cameraPreview.onloadedmetadata = () => {
          cameraReady = true;
          resolve();
        };
      });

      await safePlay(cameraPreview);
    }

    async function loadFaceDetector() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
      );

      faceDetector = await FaceDetector.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite"
        },
        runningMode: "VIDEO",
        minDetectionConfidence: MIN_SCORE,
        minSuppressionThreshold: 0.3
      });
    }

    /*
      =========================
      检测循环
      =========================
    */

    function detectLoop() {
      const now = performance.now();

      if (
        faceDetector &&
        cameraReady &&
        cameraPreview.readyState >= 2 &&
        now - lastDetectAt >= DETECT_INTERVAL_MS
      ) {
        lastDetectAt = now;

        const result = faceDetector.detectForVideo(cameraPreview, now);
        const hasValidFace = checkHasValidFace(result);

        updateScreenState(hasValidFace, now);
        updateDebugStatus();
      }

      requestAnimationFrame(detectLoop);
    }

    function checkHasValidFace(result) {
      lastValidFace = false;
      lastFaceCount = result && result.detections ? result.detections.length : 0;
      lastScore = 0;
      lastAreaRatio = 0;
      lastCentered = false;

      if (!result || !result.detections || result.detections.length === 0) {
        return false;
      }

      const videoWidth = cameraPreview.videoWidth || 320;
      const videoHeight = cameraPreview.videoHeight || 240;
      const frameArea = videoWidth * videoHeight;

      for (const detection of result.detections) {
        const score = detection.categories?.[0]?.score ?? 0;
        const box = detection.boundingBox;

        if (!box) continue;

        const faceArea = box.width * box.height;
        const areaRatio = faceArea / frameArea;

        const centerX = box.originX + box.width / 2;
        const centerY = box.originY + box.height / 2;

        const normalizedX = centerX / videoWidth;
        const normalizedY = centerY / videoHeight;

        const isCenteredX = Math.abs(normalizedX - 0.5) <= CENTER_TOLERANCE_X;
        const isCenteredY = Math.abs(normalizedY - 0.5) <= CENTER_TOLERANCE_Y;
        const isCentered = isCenteredX && isCenteredY;

        lastScore = score;
        lastAreaRatio = areaRatio;
        lastCentered = isCentered;

        if (score < MIN_SCORE) continue;
        if (areaRatio < MIN_FACE_AREA_RATIO) continue;
        if (!isCentered) continue;

        lastValidFace = true;
        return true;
      }

      return false;
    }

    function updateScreenState(hasValidFace, now) {
      if (hasValidFace) {
        lastFaceSeenAt = now;

        if (firstFaceSeenAt === 0) {
          firstFaceSeenAt = now;
        }

        if (!isScreenOn && now - firstFaceSeenAt >= FACE_ON_DELAY_MS) {
          turnScreenOn();
        }
      } else {
        firstFaceSeenAt = 0;

        if (isScreenOn && now - lastFaceSeenAt >= FACE_OFF_DELAY_MS) {
          turnScreenOff();
        }
      }
    }

    /*
      =========================
      手机端稳定版显示 / 隐藏视频
      =========================
    */

    function turnScreenOn() {
      isScreenOn = true;

      // 先显示视频元素
      mainVideo.style.visibility = "visible";
      mainVideo.style.opacity = "1";

      // 再移除黑屏
      blackout.classList.add("hide");

      safePlay(mainVideo);
    }

    function turnScreenOff() {
      isScreenOn = false;

      // 先暂停
      mainVideo.pause();

      // 再隐藏视频元素
      mainVideo.style.opacity = "0";
      mainVideo.style.visibility = "hidden";

      // 最后显示黑屏层
      blackout.classList.remove("hide");
    }

    /*
      =========================
      工具函数
      =========================
    */

    async function safePlay(video) {
      try {
        await video.play();
      } catch (error) {
        console.warn("video play failed:", error);
      }
    }

    async function enterFullscreen() {
      const el = document.documentElement;

      try {
        if (el.requestFullscreen) {
          await el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
          await el.webkitRequestFullscreen();
        }
      } catch (error) {
        console.warn("Fullscreen failed:", error);
      }
    }

    function setStatus(text) {
      statusEl.innerText =
        text +
        "\n\n" +
        `screen=${screenId}\n` +
        `video=${videoSrc}`;
    }

    function updateDebugStatus() {
      const cameraSize =
        `${cameraPreview.videoWidth || 0}x${cameraPreview.videoHeight || 0}`;

      statusEl.innerText =
        `screen=${screenId}\n` +
        `video=${videoSrc}\n` +
        `camera=${cameraSize}\n` +
        `faces=${lastFaceCount}\n` +
        `valid=${lastValidFace}\n` +
        `screenOn=${isScreenOn}\n` +
        `videoHidden=${mainVideo.style.visibility === "hidden"}\n` +
        `videoPaused=${mainVideo.paused}\n` +
        `score=${lastScore.toFixed(2)}\n` +
        `area=${lastAreaRatio.toFixed(3)}\n` +
        `centered=${lastCentered}`;
    }

    /*
      =========================
      防止手机息屏
      =========================
    */

    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch (error) {
        console.warn("Wake Lock not available:", error);
      }
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        await requestWakeLock();
        safePlay(cameraPreview);

        if (isScreenOn) {
          safePlay(mainVideo);
        }
      }
    });

    startButton.addEventListener("click", requestWakeLock);
  </script>
</body>
</html>
