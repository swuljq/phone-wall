<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Face Activated Phone Screen</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      touch-action: manipulation;
      font-family: Arial, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      overflow: hidden;
    }

    #mainVideo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
      z-index: 1;
      opacity: 1;
      visibility: visible;
      display: block;
      transition: opacity 1.5s ease-in-out;
    }

    #blackout {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 10;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.2s linear;
    }

    #blackout.hide {
      opacity: 0;
    }

    /*
      摄像头预览：
      默认隐藏。
      只有网址加 debug=1 时显示。
    */
    #cameraPreview {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 120px;
      height: 160px;
      object-fit: cover;
      z-index: 99998;
      opacity: 0;
      transform: scaleX(-1);
      pointer-events: none;
      border: none;
      background: black;
    }

    body.debug #cameraPreview {
      opacity: 0.45;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /*
      状态文字：
      默认隐藏。
      只有网址加 debug=1 时显示。
    */
    #status {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 99999;
      color: #00ff88;
      background: rgba(0, 0, 0, 0.75);
      font-size: 14px;
      line-height: 1.4;
      padding: 8px 10px;
      border-radius: 6px;
      pointer-events: none;
      display: none;
      white-space: pre-line;
      max-width: calc(100vw - 24px);
      box-sizing: border-box;
    }

    body.debug #status {
      display: block;
    }

    #startLayer {
      position: fixed;
      inset: 0;
      z-index: 100000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      color: white;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #startBox {
      max-width: 320px;
    }

    #startButton {
      border: 1px solid white;
      background: transparent;
      color: white;
      font-size: 18px;
      padding: 14px 24px;
      border-radius: 999px;
    }

    #startHint {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div id="app">
    <video
      id="mainVideo"
      playsinline
      webkit-playsinline
      muted
      loop
      preload="metadata"
    ></video>

    <div id="blackout"></div>

    <video
      id="cameraPreview"
      autoplay
      muted
      playsinline
      webkit-playsinline
    ></video>

    <div id="status">status loading...</div>

    <div id="startLayer">
      <div id="startBox">
        <button id="startButton">点击启动</button>
        <div id="startHint">
          启动后请允许使用摄像头。<br />
          检测到人脸时播放；检测不到时黑屏。
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      FaceDetector,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

    /*
      =========================
      网址参数
      =========================
    */

    const params = new URLSearchParams(location.search);
    const screenId = params.get("screen") || "1";
    const debugMode = params.get("debug") === "1";

    if (debugMode) {
      document.body.classList.add("debug");
    }

    /*
      =========================
      视频路径
      =========================
    */

    // 默认：
    // ?screen=1 -> videos/1.mp4
    // ?screen=2 -> videos/2.mp4
    // ?screen=3 -> videos/3.mp4
    //
    // 也可以：
    // ?video=videos/test.mp4
    const videoSrc = params.get("video") || `videos/${screenId}.mp4`;

    /*
      =========================
      可调参数
      =========================
    */

    const DETECT_INTERVAL_MS = 180;

    const FACE_ON_DELAY_MS = 350;
    const FACE_OFF_DELAY_MS = 800;

    const MIN_SCORE = 0.68;
    const MIN_FACE_AREA_RATIO = 0.015;

    const CENTER_TOLERANCE_X = 0.3;
    const CENTER_TOLERANCE_Y = 0.35;

    /*
      =========================
      DOM
      =========================
    */

    const mainVideo = document.getElementById("mainVideo");
    const cameraPreview = document.getElementById("cameraPreview");
    const blackout = document.getElementById("blackout");
    const startLayer = document.getElementById("startLayer");
    const startButton = document.getElementById("startButton");
    const statusEl = document.getElementById("status");

    setStatus("JS 已加载，等待点击启动");

    /*
      手机稳定版：
      一开始不要给 video 设置 src。
      检测到人脸时再设置 src。
    */
    let savedVideoTime = 0;

    mainVideo.removeAttribute("src");
    mainVideo.load();

    /*
      =========================
      状态变量
      =========================
    */

    let faceDetector = null;
    let cameraReady = false;
    let isScreenOn = false;
    let hasStartedLoop = false;

    let firstFaceSeenAt = 0;
    let lastFaceSeenAt = 0;
    let lastDetectAt = 0;

    let lastValidFace = false;
    let lastFaceCount = 0;
    let lastScore = 0;
    let lastAreaRatio = 0;
    let lastCentered = false;

    /*
      =========================
      启动按钮
      =========================
    */

    startButton.addEventListener("click", async () => {
      startButton.disabled = true;
      startButton.innerText = "启动中...";

      try {
        await enterFullscreen();

        setStatus("正在准备视频...");
        prepareVideoElement();

        setStatus("正在打开前置摄像头...");
        await startCamera();

        setStatus("正在加载人脸检测模型...");
        await loadFaceDetector();

        startLayer.style.display = "none";

        turnScreenOff();

        setStatus("启动完成，开始检测人脸");

        if (!hasStartedLoop) {
          hasStartedLoop = true;
          detectLoop();
        }
      } catch (error) {
        console.error(error);

        startButton.disabled = false;
        startButton.innerText = "启动失败，点我重试";

        setStatus(
          "启动失败\n" +
          String(error && error.message ? error.message : error)
        );
      }
    });

    function prepareVideoElement() {
      mainVideo.muted = true;
      mainVideo.loop = true;
      mainVideo.playsInline = true;

      mainVideo.setAttribute("muted", "");
      mainVideo.setAttribute("playsinline", "");
      mainVideo.setAttribute("webkit-playsinline", "");
      mainVideo.setAttribute("preload", "metadata");

      mainVideo.pause();
      mainVideo.removeAttribute("src");
      mainVideo.load();

      mainVideo.style.opacity = "0";
      mainVideo.style.visibility = "visible";
      mainVideo.style.display = "block";

      blackout.classList.remove("hide");
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("当前浏览器不支持摄像头。请使用 Safari 或 Chrome，并确认网址是 HTTPS。");
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: "user",
          width: { ideal: 320 },
          height: { ideal: 240 },
          frameRate: { ideal: 12, max: 15 }
        }
      });

      cameraPreview.srcObject = stream;

      await new Promise((resolve) => {
        cameraPreview.onloadedmetadata = () => {
          cameraReady = true;
          resolve();
        };
      });

      await safePlay(cameraPreview);
    }

    async function loadFaceDetector() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
      );

      faceDetector = await FaceDetector.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite"
        },
        runningMode: "VIDEO",
        minDetectionConfidence: MIN_SCORE,
        minSuppressionThreshold: 0.3
      });
    }

    /*
      =========================
      检测循环
      =========================
    */

    function detectLoop() {
      const now = performance.now();

      if (
        faceDetector &&
        cameraReady &&
        cameraPreview.readyState >= 2 &&
        now - lastDetectAt >= DETECT_INTERVAL_MS
      ) {
        lastDetectAt = now;

        const result = faceDetector.detectForVideo(cameraPreview, now);
        const hasValidFace = checkHasValidFace(result);

        updateScreenState(hasValidFace, now);

        if (debugMode) {
          updateDebugStatus();
        }
      }

      requestAnimationFrame(detectLoop);
    }

    function checkHasValidFace(result) {
      lastValidFace = false;
      lastFaceCount = result && result.detections ? result.detections.length : 0;
      lastScore = 0;
      lastAreaRatio = 0;
      lastCentered = false;

      if (!result || !result.detections || result.detections.length === 0) {
        return false;
      }

      const videoWidth = cameraPreview.videoWidth || 320;
      const videoHeight = cameraPreview.videoHeight || 240;
      const frameArea = videoWidth * videoHeight;

      for (const detection of result.detections) {
        const score = detection.categories?.[0]?.score ?? 0;
        const box = detection.boundingBox;

        if (!box) continue;

        const faceArea = box.width * box.height;
        const areaRatio = faceArea / frameArea;

        const centerX = box.originX + box.width / 2;
        const centerY = box.originY + box.height / 2;

        const normalizedX = centerX / videoWidth;
        const normalizedY = centerY / videoHeight;

        const isCenteredX = Math.abs(normalizedX - 0.5) <= CENTER_TOLERANCE_X;
        const isCenteredY = Math.abs(normalizedY - 0.5) <= CENTER_TOLERANCE_Y;
        const isCentered = isCenteredX && isCenteredY;

        lastScore = score;
        lastAreaRatio = areaRatio;
        lastCentered = isCentered;

        if (score < MIN_SCORE) continue;
        if (areaRatio < MIN_FACE_AREA_RATIO) continue;
        if (!isCentered) continue;

        lastValidFace = true;
        return true;
      }

      return false;
    }

    function updateScreenState(hasValidFace, now) {
      if (hasValidFace) {
        lastFaceSeenAt = now;

        if (firstFaceSeenAt === 0) {
          firstFaceSeenAt = now;
        }

        if (!isScreenOn && now - firstFaceSeenAt >= FACE_ON_DELAY_MS) {
          turnScreenOn();
        }
      } else {
        firstFaceSeenAt = 0;

        if (isScreenOn && now - lastFaceSeenAt >= FACE_OFF_DELAY_MS) {
          turnScreenOff();
        }
      }
    }

    /*
      =========================
      手机稳定版开关视频
      =========================
    */

    function turnScreenOn() {

      isScreenOn = true;

      blackout.classList.add("hide");

      mainVideo.style.display = "block";
      mainVideo.style.visibility = "visible";

      setTimeout(() => {
        mainVideo.style.opacity = "1";
      }, 50);

      const hasSrc = mainVideo.getAttribute("src");

      if (!hasSrc) {
        mainVideo.src = videoSrc;
        mainVideo.load();

        mainVideo.onloadedmetadata = () => {
          if (savedVideoTime > 0 && savedVideoTime < mainVideo.duration) {
            mainVideo.currentTime = savedVideoTime;
          }
          safePlay(mainVideo);
        };
      } else {
        mainVideo.currentTime = savedVideoTime;
        safePlay(mainVideo);
      }
    }

    function turnScreenOff() {

      isScreenOn = false;

      // 保存播放位置
      try {
        savedVideoTime = mainVideo.currentTime;
      } catch (e) {}

      // 暂停，但是不删除 src
      mainVideo.pause();

      // 视频渐渐变黑
      mainVideo.style.opacity = "0";

      // 渐变完成后显示黑屏
      setTimeout(() => {
        if (!isScreenOn) {
          blackout.classList.remove("hide");
        }
      }, 1500);
    }

    /*
      =========================
      工具函数
      =========================
    */

    async function safePlay(video) {
      try {
        await video.play();
      } catch (error) {
        console.warn("video play failed:", error);
      }
    }

    async function enterFullscreen() {
      const el = document.documentElement;

      try {
        if (el.requestFullscreen) {
          await el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
          await el.webkitRequestFullscreen();
        }
      } catch (error) {
        console.warn("Fullscreen failed:", error);
      }
    }

    function setStatus(text) {
      if (!debugMode) return;

      statusEl.innerText =
        text +
        "\n\n" +
        `screen=${screenId}\n` +
        `video=${videoSrc}`;
    }

    function updateDebugStatus() {
      const cameraSize =
        `${cameraPreview.videoWidth || 0}x${cameraPreview.videoHeight || 0}`;

      const hasVideoSrc = !!mainVideo.getAttribute("src");

      statusEl.innerText =
        `screen=${screenId}\n` +
        `video=${videoSrc}\n` +
        `camera=${cameraSize}\n` +
        `faces=${lastFaceCount}\n` +
        `valid=${lastValidFace}\n` +
        `screenOn=${isScreenOn}\n` +
        `hasVideoSrc=${hasVideoSrc}\n` +
        `videoDisplay=${mainVideo.style.display}\n` +
        `videoPaused=${mainVideo.paused}\n` +
        `score=${lastScore.toFixed(2)}\n` +
        `area=${lastAreaRatio.toFixed(3)}\n` +
        `centered=${lastCentered}`;
    }

    /*
      =========================
      防止手机息屏
      =========================
    */

    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch (error) {
        console.warn("Wake Lock not available:", error);
      }
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        await requestWakeLock();
        safePlay(cameraPreview);

        if (isScreenOn && mainVideo.getAttribute("src")) {
          safePlay(mainVideo);
        }
      }
    });

    startButton.addEventListener("click", requestWakeLock);
  </script>
</body>
</html>
